- title: "Escultura"
  slug: "escultura"
  description: "Conservação e restauro de escultura em madeira, pedra, terracota, gesso e metal, abrangendo imaginária religiosa, escultura decorativa e ornamental."

- title: "Materiais Pétreos"
  slug: "materiais-petreos"
  description: "Conservação e restauro de fachadas, azulejaria, coberturas, cúpulas, fontes e escultura em pedra, utilizando técnicas tradicionais e contemporâneas."

- title: "Talha Dourada e Policromada"
  slug: "talha-dourada"
  description: "Conservação e restauro de retábulos, tectos e demais elementos decorativos em talha dourada e policromada, respeitando as técnicas históricas de douramento e policromia."

- title: "Pintura Mural"
  slug: "pintura-mural"
  description: "Conservação e restauro de pinturas murais a têmpera ou fresco, sobre pedra, reboco ou estuque, em tectos e paredes, com especial atenção à preservação da técnica original."

- title: "Pintura de Cavalete"
  slug: "pintura-cavalete"
  description: "Conservação e restauro de pintura sobre madeira ou tela, incluindo tratamento de suportes, camadas pictóricas e vernizes, com metodologias cientificamente sustentadas."

- title: "Estuques Decorativos"
  slug: "estuques-decorativos"
  description: "Conservação e restauro de estuques decorativos e ornamentais, incluindo elementos arquitectónicos em gesso, utilizando técnicas tradicionais de estucagem."

- title: "Consultadoria"
  slug: "consultadoria"
  description: "Estudos de diagnóstico, propostas de intervenção, relatórios de monitorização e consultoria técnica especializada para a preservação do património cultural."

- title: "Execução de Peças"
  slug: "execucao-pecas"
  description: "Criação de peças novas utilizando técnicas tradicionais de douramento e policromia, bem como reproduções fiéis de elementos decorativos e escultóricos."

- title: "Controlo Integrado de Insetos"
  slug: "controlo-insetos"
  description: "Tratamento e prevenção de infestações por insectos xilófagos e bibliófagos, com métodos integrados de controlo que garantem a preservação dos bens culturais."
