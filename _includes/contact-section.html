<!-- CONTACTE-NOS Section -->
<section class="contacte-nos" id="contacte-nos">
    <!-- Hero Banner -->
    <div class="section-hero" style="background-image: url('{{ site.baseurl }}/assets/images/backgrounds/contact-hero.jpg');">
        <div class="section-hero-overlay"></div>
        <div class="section-hero-content">
            <h2 class="section-hero-title">CONTACTE-NOS</h2>
        </div>
    </div>

    <!-- Contact Content -->
    <div class="container">
        <div class="contact-wrapper">
            <!-- Left Column - Contact Information -->
            <div class="contact-info">
                <h3 class="contact-subtitle">CONTACTE-NOS</h3>

                <div class="contact-details">
                    <div class="contact-item">
                        <h4 class="contact-label">Morada</h4>
                        <p>Rua dos Lavradores, 13</p>
                        <p>3090-476 Maiorca, Figueira da Foz</p>
                    </div>

                    <div class="contact-item">
                        <h4 class="contact-label">Telefone</h4>
                        <p><a href="tel:+351233939816">233 939 816</a></p>
                        <p><a href="tel:+351919691019">919 691 019</a></p>
                    </div>

                    <div class="contact-item">
                        <h4 class="contact-label">E-mail</h4>
                        <p><a href="mailto:quadrifolio@sapo.pt">quadrifolio@sapo.pt</a></p>
                    </div>
                </div>
            </div>

            <!-- Right Column - Contact Form -->
            <div class="contact-form-wrapper">
                <form class="contact-form" id="contact-form">
                    <div class="form-group">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" id="nome" name="nome" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" id="email" name="email" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="mensagem" class="form-label">Mensagem</label>
                        <textarea id="mensagem" name="mensagem" class="form-textarea" rows="6" required></textarea>
                    </div>

                    <div class="form-submit">
                        <button type="submit" class="btn-submit">Submeter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
